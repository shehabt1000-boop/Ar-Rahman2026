<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | مسجد الرحمن</title>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #0a3622;
            --secondary: #d4af37;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --text-dark: #2c3e50;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light-bg); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Amiri', serif; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 65px;
            background: rgba(10, 54, 34, 0.95); backdrop-filter: blur(10px);
            padding: 0 5%; display: flex; justify-content: space-between; align-items: center;
            color: var(--secondary); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-brand { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: bold; white-space: nowrap; }

        .section { padding: 80px 5% 50px; max-width: 1200px; margin: 0 auto; position: relative;}
        .section-header { text-align: center; margin-bottom: 30px; }
        .title-row { display: flex; justify-content: center; align-items: baseline; gap: 10px; margin-bottom: 5px; flex-wrap: wrap; }
        .section-title { font-size: 2rem; color: var(--primary); margin: 0; word-break: break-word; }

        .activities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .activity-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s ease; position: relative; will-change: transform;}
        .activity-img { width: 100%; height: 160px; object-fit: cover; }
        .activity-content { padding: 15px; }
        .activity-title { font-size: 1.1rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; }
        .activity-desc { color: #666; font-size: 0.95rem; max-height: 90px; overflow-y: auto; padding-right: 5px; white-space: pre-wrap; line-height: 1.5; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; height: 160px; box-shadow: var(--shadow); cursor: pointer; will-change: transform;}
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .gallery-caption { position: absolute; bottom: -100%; left: 0; width: 100%; padding: 8px; background: rgba(0,0,0,0.7); color: var(--white); transition: bottom 0.3s ease; text-align: center; font-size: 0.85rem; pointer-events: none; }

        .admin-controls { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 8px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .admin-controls button { border: none; background: none; cursor: pointer; font-size: 16px; padding: 5px; border-radius: 5px; transition: background 0.2s; }
        .admin-controls .btn-edit { color: var(--primary); }
        .admin-controls .btn-delete { color: #ff3b30; }
        .admin-controls button:hover { background: #eee; }

        #admin-panel { display: none; padding: 20px 5% 40px; background: #fff; border-radius: 15px; margin-bottom: 30px; box-shadow: var(--shadow); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media(max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
        .admin-card { background: var(--light-bg); padding: 20px; border-radius: 10px; border-right: 4px solid var(--primary); }[dir="ltr"] .admin-card { border-right: none; border-left: 4px solid var(--primary); }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size:0.9rem;}
        .admin-btn { background: var(--primary); color: var(--white); border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.2); transform: scale(0.95); animation: scaleUp 0.2s ease-out forwards; max-height: 90vh; overflow-y: auto;}
        @keyframes scaleUp { to { transform: scale(1); } }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
        .modal-content textarea { resize: vertical; }
        .modal-content label { display: block; text-align: right; font-weight: bold; color: var(--primary); font-size: 0.9rem; margin-top: 5px; }[dir="ltr"] .modal-content label { text-align: left; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 1rem; transition: background 0.2s; }
        .modal-btn.primary { background: var(--primary); color: var(--white); }
        .modal-btn.primary:hover { background: #08291a; }
        .modal-btn.cancel { background: #f1f1f1; color: #333; }
        .modal-btn.cancel:hover { background: #e2e2e2; }
        .modal-btn.danger { background: #ff3b30; color: #fff; }
        .modal-btn.danger:hover { background: #d32f2f; }

        .app-toast-container { position: fixed; top: 80px; left: 50%; transform: translate(-50%, -50px); background: linear-gradient(135deg, var(--primary), #0c4a2e); color: var(--white); padding: 15px 25px; border-radius: 30px; display: flex; align-items: center; gap: 10px; opacity: 0; visibility: hidden; transition: transform 0.4s ease, opacity 0.4s ease; z-index: 10000; border: 1px solid var(--secondary); text-align: center; max-width: 90%; font-size: 1.1rem; font-family: inherit; box-shadow: 0 5px 15px rgba(0,0,0,0.2); will-change: transform, opacity; }
        .app-toast-container i { font-size: 1.1rem; }
        .app-toast-container.show { transform: translate(-50%, 0); opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <i class="fas fa-mosque"></i>
            <span>لوحة الإدارة - مسجد الرحمن</span>
        </div>
        <div class="header-actions">
            <a href="index.html" style="color: var(--secondary); text-decoration: none; font-weight: bold; border: 1px solid var(--secondary); padding: 5px 10px; border-radius: 8px;">العودة للموقع</a>
        </div>
    </header>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="admin-login-modal" style="display: flex;">
        <div class="modal-content">
            <i class="fas fa-user-shield" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 15px; font-family: 'Amiri'; color: var(--primary);">تسجيل دخول الإدارة</h3>
            <input type="email" id="admin-email" placeholder="البريد الإلكتروني">
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button class="modal-btn primary" id="login-btn" onclick="verifyAdmin()" style="margin-bottom: 10px; width: 100%;">دخول</button>
            <p id="login-error" style="color: red; font-size: 0.9rem; margin-top: 10px; display: none;">بيانات الدخول غير صحيحة!</p>
        </div>
    </div>

    <!-- Custom Delete Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content" style="max-width: 350px;">
            <i class="fas fa-exclamation-triangle" style="font-size: 45px; color: #ff3b30; margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 10px; color: var(--text-dark);" id="confirm-title">تأكيد الحذف</h3>
            <p style="color: #666; margin-bottom: 20px; font-size: 0.95rem;" id="confirm-msg">هل أنت متأكد من أنك تريد حذف هذا العنصر نهائياً؟</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeConfirmModal()">إلغاء</button>
                <button class="modal-btn danger" id="confirm-yes-btn">حذف</button>
            </div>
        </div>
    </div>

    <!-- Edit Activity Modal -->
    <div class="modal-overlay" id="edit-activity-modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 15px;"><i class="fas fa-edit"></i> تعديل النشاط</h3>
            <input type="hidden" id="modal-edit-act-id">
            <label>عنوان النشاط (عربي)</label><input type="text" id="modal-act-title-ar" placeholder="العنوان بالعربية">
            <label>عنوان النشاط (سويدي)</label><input type="text" id="modal-act-title-sv" placeholder="Aktivitetstitel (Svenska)">
            <label>التفاصيل (عربي)</label><textarea id="modal-act-desc-ar" rows="3" placeholder="التفاصيل بالعربية"></textarea>
            <label>التفاصيل (سويدي)</label><textarea id="modal-act-desc-sv" rows="3" placeholder="Detaljer (Svenska)"></textarea>
            <label>تغيير الصورة (اختياري)</label><input type="file" id="modal-act-img" accept="image/*">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditActivityModal()">إلغاء</button>
                <button class="modal-btn primary" id="modal-btn-save-act" onclick="saveEditedActivity()">حفظ التعديلات</button>
            </div>
        </div>
    </div>

    <!-- Edit Gallery Modal -->
    <div class="modal-overlay" id="edit-gallery-modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 15px;"><i class="fas fa-edit"></i> تعديل صورة المعرض</h3>
            <input type="hidden" id="modal-edit-gal-id">
            <label>رابط الصورة (URL)</label><input type="text" id="modal-gal-url" placeholder="رابط الصورة المباشر" style="direction: ltr;">
            <label>الوصف (عربي)</label><input type="text" id="modal-gal-cap-ar" placeholder="وصف الصورة بالعربية">
            <label>الوصف (سويدي)</label><input type="text" id="modal-gal-cap-sv" placeholder="Bildbeskrivning (Svenska)">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditGalleryModal()">إلغاء</button>
                <button class="modal-btn primary" id="modal-btn-save-gal" onclick="saveEditedGallery()">حفظ التعديلات</button>
            </div>
        </div>
    </div>

    <div class="section" id="admin-dashboard" style="display: none;">
        
        <!-- Admin Panel -->
        <div id="admin-panel" style="display: block;">
            <h2 style="color:var(--primary); text-align:center; font-family:'Amiri';">لوحة تحكم الإدارة</h2>
            <button class="admin-btn" style="background: red; width: auto; margin-bottom: 20px;" onclick="logoutAdmin()">تسجيل الخروج</button>
            <div class="admin-grid">
                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fas fa-image"></i> إضافة صور للمعرض</h3>
                    <input type="file" id="gallery-upload" class="admin-input" multiple accept="image/*">
                    <input type="text" id="gallery-caption-ar" class="admin-input" placeholder="وصف الصورة (عربي)">
                    <input type="text" id="gallery-caption-sv" class="admin-input" placeholder="Bildbeskrivning (Svenska)">
                    <button class="admin-btn" onclick="uploadGalleryImages()">رفع للمعرض <i class="fas fa-cloud-upload-alt"></i></button>
                    <p id="gallery-status" style="color: green; margin-top: 10px; font-weight:bold;"></p>
                </div>

                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fas fa-plus-circle"></i> إضافة نشاط جديد</h3>
                    <input type="text" id="act-title-ar" class="admin-input" placeholder="عنوان النشاط (عربي)">
                    <input type="text" id="act-title-sv" class="admin-input" placeholder="Aktivitetstitel (Svenska)">
                    <textarea id="act-desc-ar" class="admin-input" placeholder="التفاصيل (عربي)" rows="2"></textarea>
                    <textarea id="act-desc-sv" class="admin-input" placeholder="Detaljer (Svenska)" rows="2"></textarea>
                    <input type="file" id="act-img" class="admin-input" accept="image/*">
                    <button class="admin-btn" onclick="addNewActivity()">حفظ النشاط <i class="fas fa-check"></i></button>
                    <p id="act-status" style="color: green; margin-top: 10px; font-weight:bold;"></p>
                </div>

                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fas fa-bell"></i> إرسال تذكير منبثق (Toast)</h3>
                    <input type="text" id="toast-text-ar" class="admin-input" placeholder="نص التذكير (عربي)">
                    <input type="text" id="toast-text-sv" class="admin-input" placeholder="Meddelande (Svenska)">
                    <button class="admin-btn" onclick="sendToast()">إرسال التذكير للمستخدمين <i class="fas fa-paper-plane"></i></button>
                    <p id="toast-status" style="color: green; margin-top: 10px; font-weight:bold;"></p>
                </div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">إدارة الأنشطة</h2>
        </div>
        <div class="activities-grid" id="activities-container"></div>

        <div class="section-header" style="margin-top: 50px;">
            <h2 class="section-title">إدارة المعرض</h2>
        </div>
        <div class="gallery-grid" id="gallery-container"></div>

    </div>

    <!-- Toast -->
    <div id="app-toast-box" class="app-toast-container">
        <i class="fas fa-bell" style="color: var(--secondary);"></i> 
        <span id="toast-msg-text"></span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLOQ3i-cyhZV-A1oN5Jhy_OQj_KdqClzk",
            authDomain: "al-rahman-d0529.firebaseapp.com",
            projectId: "al-rahman-d0529",
            storageBucket: "al-rahman-d0529.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ADMIN_UID = "oW1VqNujjWU2uzYWE6vWcsFpguf2";

        let siteData = { activities:[], gallery:[] };

        function showToast(text, duration = 4000) { 
            const toastEl = document.getElementById('app-toast-box'); 
            document.getElementById('toast-msg-text').innerText = text; 
            toastEl.classList.remove('show'); void toastEl.offsetWidth; toastEl.classList.add('show'); 
            setTimeout(() => { toastEl.classList.remove('show'); }, duration); 
        }

        function verifyAdmin() {
            const email = document.getElementById('admin-email').value; const pass = document.getElementById('admin-pass').value; const btn = document.getElementById('login-btn');
            if(!email || !pass) return; btn.disabled = true; btn.innerText = "...";
            firebase.auth().signInWithEmailAndPassword(email, pass).then((userCred) => {
                if (userCred.user.uid === ADMIN_UID) { 
                    document.getElementById('admin-login-modal').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'block';
                    showToast("أهلاً بك يا مدير 👑"); listenToFirebase();
                } else { firebase.auth().signOut(); throw new Error("Unauthorized"); }
            }).catch(() => { document.getElementById('login-error').style.display = 'block'; }).finally(() => { btn.disabled = false; btn.innerText = "دخول"; });
        }

        function logoutAdmin() { firebase.auth().signOut().then(() => { location.reload(); }); }

        firebase.auth().onAuthStateChanged((user) => {
            if (user && user.uid === ADMIN_UID) { 
                document.getElementById('admin-login-modal').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                listenToFirebase();
            } else { 
                document.getElementById('admin-login-modal').style.display = 'flex';
                document.getElementById('admin-dashboard').style.display = 'none';
            }
        });

        function listenToFirebase() {
            db.collection("activities").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                siteData.activities =[]; snapshot.forEach(doc => siteData.activities.push({ id: doc.id, ...doc.data() })); renderActivities();
            });
            db.collection("gallery").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                siteData.gallery =[]; snapshot.forEach(doc => siteData.gallery.push({ id: doc.id, ...doc.data() })); renderGallery();
            });
        }

        function renderActivities() {
            const container = document.getElementById('activities-container'); let html = '';
            siteData.activities.forEach(act => {
                const title = act.titleAr || act.title; const desc = act.descAr || act.desc;
                let adminBtns = `<div class="admin-controls"><button class="btn-edit" onclick="openEditActivityModal('${act.id}')" title="تعديل"><i class="fas fa-pen"></i></button><button class="btn-delete" onclick="deleteActivity('${act.id}')" title="حذف"><i class="fas fa-trash"></i></button></div>`;
                html += `<div class="activity-card">${adminBtns}<img src="${act.img}" class="activity-img"><div class="activity-content"><h3 class="activity-title">${title}</h3><p class="activity-desc">${desc}</p></div></div>`;
            });
            container.innerHTML = html;
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container'); let html = '';
            siteData.gallery.forEach(img => {
                const cap = img.captionAr || img.caption;
                let adminBtns = `<div class="admin-controls"><button class="btn-edit" onclick="openEditGalleryModal('${img.id}', event)" title="تعديل"><i class="fas fa-pen"></i></button><button class="btn-delete" onclick="deleteGallery('${img.id}', event)" title="حذف"><i class="fas fa-trash"></i></button></div>`;
                html += `<div class="gallery-item">${adminBtns}<img src="${img.url}">${cap ? `<div class="gallery-caption">${cap}</div>` : ''}</div>`;
            });
            container.innerHTML = html;
        }

        let confirmActionCallback = null;
        function showConfirmModal(callback) { confirmActionCallback = callback; document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; confirmActionCallback = null; }
        document.getElementById('confirm-yes-btn').addEventListener('click', () => { if(confirmActionCallback) confirmActionCallback(); closeConfirmModal(); });

        async function uploadToCloudinary(file) {
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", "souq_upload");
            const res = await fetch(`https://api.cloudinary.com/v1_1/db9h7zm1h/image/upload`, { method: "POST", body: fd });
            const data = await res.json(); return data.secure_url.replace('/upload/', '/upload/w_400,q_auto,f_auto/');
        }

        async function addNewActivity() {
            const titleAr = document.getElementById('act-title-ar').value; const titleSv = document.getElementById('act-title-sv').value || titleAr;
            const descAr = document.getElementById('act-desc-ar').value; const descSv = document.getElementById('act-desc-sv').value || descAr;
            const file = document.getElementById('act-img').files[0];
            if(!titleAr) return; const statusEl = document.getElementById('act-status'); statusEl.style.color = "blue"; statusEl.innerText = "جاري الحفظ...";
            let data = { titleAr, titleSv, descAr, descSv, timestamp: Date.now() };
            if(file) { try { data.img = await uploadToCloudinary(file); } catch(e){} } else { data.img = "https://images.pexels.com/photos/8166072/pexels-photo-8166072.jpeg?auto=compress&cs=tinysrgb&w=400"; }
            db.collection("activities").add(data).then(() => {
                statusEl.style.color = "green"; statusEl.innerText = "تم الحفظ بنجاح ✔️";
                document.getElementById('act-title-ar').value=''; document.getElementById('act-title-sv').value=''; document.getElementById('act-desc-ar').value=''; document.getElementById('act-desc-sv').value=''; document.getElementById('act-img').value='';
                setTimeout(() => statusEl.innerText = "", 3000);
            });
        }

        async function uploadGalleryImages() {
            const files = document.getElementById('gallery-upload').files; if(files.length === 0) return;
            const statusEl = document.getElementById('gallery-status'); statusEl.style.color = "blue"; statusEl.innerText = "جاري الرفع...";
            const capAr = document.getElementById('gallery-caption-ar').value; const capSv = document.getElementById('gallery-caption-sv').value || capAr;
            try {
                for(let f of files) { const url = await uploadToCloudinary(f); await db.collection("gallery").add({ url, captionAr: capAr, captionSv: capSv, timestamp: Date.now() }); }
                statusEl.style.color = "green"; statusEl.innerText = "تم الرفع بنجاح ✔️";
                document.getElementById('gallery-upload').value = ''; document.getElementById('gallery-caption-ar').value = ''; document.getElementById('gallery-caption-sv').value = '';
                setTimeout(() => statusEl.innerText = "", 3000);
            } catch(e) { statusEl.style.color = "red"; statusEl.innerText = "حدث خطأ أثناء الرفع!"; }
        }

        function sendToast() {
            const ar = document.getElementById('toast-text-ar').value; const sv = document.getElementById('toast-text-sv').value || ar;
            if(!ar) return; const statusEl = document.getElementById('toast-status'); statusEl.style.color = "blue"; statusEl.innerText = "جاري الإرسال...";
            db.collection("notifications").add({ ar, sv, timestamp: Date.now() }).then(() => {
                statusEl.style.color = "green"; statusEl.innerText = "تم الإرسال ✔️"; document.getElementById('toast-text-ar').value = ''; document.getElementById('toast-text-sv').value = ''; setTimeout(() => { statusEl.innerText = ""; }, 3000);
            });
        }

        function deleteActivity(id) { showConfirmModal(() => { db.collection("activities").doc(id).delete(); showToast("تم الحذف بنجاح"); }); }
        function deleteGallery(id, event) { event.stopPropagation(); showConfirmModal(() => { db.collection("gallery").doc(id).delete(); showToast("تم الحذف بنجاح"); }); }

        function openEditActivityModal(id) {
            const act = siteData.activities.find(a => a.id === id); if(!act) return;
            document.getElementById('modal-edit-act-id').value = id;
            document.getElementById('modal-act-title-ar').value = act.titleAr || '';
            document.getElementById('modal-act-title-sv').value = act.titleSv || '';
            document.getElementById('modal-act-desc-ar').value = act.descAr || '';
            document.getElementById('modal-act-desc-sv').value = act.descSv || '';
            document.getElementById('modal-act-img').value = ''; 
            document.getElementById('edit-activity-modal').style.display = 'flex';
        }
        function closeEditActivityModal() { document.getElementById('edit-activity-modal').style.display = 'none'; }

        async function saveEditedActivity() {
            const id = document.getElementById('modal-edit-act-id').value;
            const titleAr = document.getElementById('modal-act-title-ar').value; const titleSv = document.getElementById('modal-act-title-sv').value || titleAr;
            const descAr = document.getElementById('modal-act-desc-ar').value; const descSv = document.getElementById('modal-act-desc-sv').value || descAr;
            const file = document.getElementById('modal-act-img').files[0];
            const btn = document.getElementById('modal-btn-save-act');

            if(!titleAr) return; btn.disabled = true; btn.innerText = "جاري الحفظ...";
            let updateData = { titleAr, titleSv, descAr, descSv };
            if(file) { try { updateData.img = await uploadToCloudinary(file); } catch(e){} }

            db.collection("activities").doc(id).update(updateData).then(() => {
                showToast("تم تحديث النشاط بنجاح ✔️"); closeEditActivityModal();
            }).finally(() => { btn.disabled = false; btn.innerText = "حفظ التعديلات"; });
        }

        function openEditGalleryModal(id, event) {
            event.stopPropagation(); const img = siteData.gallery.find(g => g.id === id); if(!img) return;
            document.getElementById('modal-edit-gal-id').value = id;
            document.getElementById('modal-gal-url').value = img.url || '';
            document.getElementById('modal-gal-cap-ar').value = img.captionAr || '';
            document.getElementById('modal-gal-cap-sv').value = img.captionSv || '';
            document.getElementById('edit-gallery-modal').style.display = 'flex';
        }
        function closeEditGalleryModal() { document.getElementById('edit-gallery-modal').style.display = 'none'; }

        function saveEditedGallery() {
            const id = document.getElementById('modal-edit-gal-id').value;
            const url = document.getElementById('modal-gal-url').value;
            const capAr = document.getElementById('modal-gal-cap-ar').value;
            const capSv = document.getElementById('modal-gal-cap-sv').value || capAr;
            const btn = document.getElementById('modal-btn-save-gal');

            if(!url) return; btn.disabled = true; btn.innerText = "جاري الحفظ...";
            db.collection("gallery").doc(id).update({ url: url, captionAr: capAr, captionSv: capSv }).then(() => {
                showToast("تم تحديث الصورة بنجاح ✔️"); closeEditGalleryModal();
            }).finally(() => { btn.disabled = false; btn.innerText = "حفظ التعديلات"; });
        }
    </script>
</body>
</html>
